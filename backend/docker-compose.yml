
services:
  master:
    image: postgres:15
    container_name: pg_master
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pg_master_data:/var/lib/postgresql/data
    networks:
      - pg_network

  replica:
    image: postgres:15
    container_name: pg_replica
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydb
      POSTGRES_REPLICATION_USER: repl_user
      POSTGRES_REPLICATION_PASSWORD: repl_password
      POSTGRES_PRIMARY_HOST: master
      POSTGRES_PRIMARY_PORT: 5432
    depends_on:
      - master
    ports:
      - "5433:5432"
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    networks:
      - pg_network

volumes:
  pg_master_data:
  pg_replica_data:

networks:
  pg_network:
